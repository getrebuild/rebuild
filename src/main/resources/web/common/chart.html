<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <th:block th:replace="~{/_include/header}" />
    <title>[[${title ?:'REBUILD'}]]</title>
    <link rel="stylesheet" type="text/css" th:href="@{/assets/css/charts.css}" />
    <style>
      html,
      body,
      .main-content,
      .chart-wrap {
        background-color: #fff;
        height: 100%;
        overflow: hidden;
      }
      .main-content,
      .chart-wrap {
        min-height: 500px;
      }
      .chart-box .chart-head .chart-title {
        cursor: default;
      }
      .chart-box .chart-head .chart-oper {
        display: block;
      }
      .chart-box .chart-head .chart-oper .J_fullscreen {
        display: none !important;
      }

      .less-head .chart-box {
        padding: 0;
      }
      .less-head .chart-box .chart-head {
        visibility: hidden;
      }
      .less-head .chart-box.TABLE .chart-head {
        display: none;
      }
      .less-head .chart-box.TABLE .chart-body {
        padding: 0;
        margin: 10px 10px 0;
        margin: 0;
      }
      .less-head .chart.ctable {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div class="main-content m-0 p-0">
      <div class="chart-wrap less-head"></div>
    </div>
    <th:block th:replace="~{/_include/footer}" />
    <script th:src="@{/assets/js/general/rb-advfilter.js}" type="text/babel"></script>
    <script th:src="@{/assets/lib/charts/echarts.min.js?v=5.5.0}"></script>
    <script th:src="@{/assets/lib/charts/tablecellsselection.js}"></script>
    <script th:src="@{/assets/js/charts/charts.mapstyle.js}" type="text/babel"></script>
    <script th:src="@{/assets/js/charts/charts.js}" type="text/babel"></script>
    <script>
      window.__PageConfig = {
        chartId: '[[${chartId}]]',
        chartConfig: [(${chartConfig ?:'null'})],
        chartFilter: [(${chartFilter ?:'null'})],
      }
    </script>
    <script type="text/babel">
      const wpc = window.__PageConfig
      // if (window.frameElement) $(window.frameElement).parents('.modal-content').find('.modal-title').text(wpc.chartConfig.title)
      $(document).ready(() => {
        let conf = $clone(wpc.chartConfig)
        conf = conf.config
        conf.extconfig = { chart_filter: wpc.chartFilter }
        conf.editable = false
        renderRbcomp(detectChart(conf, wpc.chartId), $('.chart-wrap'))
        // v4.4-b6
        if (~~$urlp('head') === 1) $('.less-head').removeClass('less-head')
      })
    </script>
  </body>
</html>
